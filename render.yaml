services:
  - type: web
    name: er-sheetmusicscroll-api
    runtime: node
    region: oregon
    plan: starter        # ~$7/mo — persistent disk, no cold-start sleep

    rootDir: admin

    buildCommand: npm ci && npm run build
    startCommand: npm run start

    # Persistent disk for ephemeral job files (PDF uploads + rendered page PNGs).
    # Files are temporary — only needed for the duration of a user's upload session.
    # 1 GB is more than enough; bump if you regularly process very large scores.
    disk:
      name: tmp-storage
      mountPath: /opt/render/project/src/tmp
      sizeGB: 1

    envVars:
      - key: NODE_ENV
        value: production
      - key: TMP_DIR
        value: /opt/render/project/src/tmp
      - key: SUPABASE_URL
        sync: false          # set in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
