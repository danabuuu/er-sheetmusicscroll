<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=640, initial-scale=1.0" />
  <title>ER Sheet Music Scroll</title>
  <style>
    :root {
      --g-bg:             #232323;
      --g-surface:        #2F2F2F;
      --g-overlay:        #1E1E1E;
      --g-text-primary:   #FFFFFF;
      --g-text-secondary: #808080;
      --g-text-ui:        #D3D3D3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 640px;
      height: 350px;
      overflow: hidden;
      background: var(--g-bg);
      color: var(--g-text-primary);
      font-family: 'Even Roster Grotesk', sans-serif;
    }
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--g-text-secondary);
    }
  </style>
</head>
<body>
  <div id="status">Connecting…</div>
  <script type="module" src="/Main.ts"></script>
</body>
</html>
